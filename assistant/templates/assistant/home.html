<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Google Drive AI Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: dark light;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at top, #1f2937, #020617);
        color: #e5e7eb;
      }
      .card {
        background: rgba(15, 23, 42, 0.9);
        border-radius: 18px;
        padding: 32px 28px;
        width: 100%;
        max-width: 720px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.7);
        border: 1px solid rgba(148, 163, 184, 0.2);
        backdrop-filter: blur(18px);
      }
      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        gap: 12px;
      }
      .title {
        font-size: 1.6rem;
        font-weight: 650;
        letter-spacing: 0.02em;
      }
      .badge {
        padding: 4px 10px;
        border-radius: 999px;
        background: rgba(34, 197, 94, 0.1);
        color: #bbf7d0;
        font-size: 0.75rem;
        border: 1px solid rgba(34, 197, 94, 0.45);
      }
      .description {
        font-size: 0.95rem;
        color: #9ca3af;
        margin-bottom: 24px;
      }
      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 24px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 10px 18px;
        border-radius: 999px;
        border: 1px solid transparent;
        cursor: pointer;
        font-size: 0.9rem;
        font-weight: 500;
        transition: all 0.16s ease-out;
      }
      .btn-primary {
        background: linear-gradient(135deg, #22c55e, #16a34a);
        color: #ecfdf5;
        box-shadow: 0 12px 30px rgba(22, 163, 74, 0.45);
      }
      .btn-primary:hover {
        transform: translateY(-1px);
        box-shadow: 0 14px 36px rgba(22, 163, 74, 0.6);
      }
      .btn-outline {
        background: transparent;
        border-color: rgba(148, 163, 184, 0.5);
        color: #e5e7eb;
      }
      .btn-outline:hover {
        border-color: #22c55e;
        color: #bbf7d0;
      }
      .search-panel {
        background: rgba(15, 23, 42, 0.85);
        border-radius: 14px;
        padding: 14px 14px 12px;
        border: 1px solid rgba(55, 65, 81, 0.8);
      }
      .search-label {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: #6b7280;
        margin-bottom: 6px;
      }
      .search-row {
        display: flex;
        gap: 10px;
      }
      .search-input {
        flex: 1;
        border-radius: 999px;
        border: 1px solid rgba(75, 85, 99, 0.9);
        background: rgba(15, 23, 42, 0.9);
        padding: 9px 14px;
        color: #e5e7eb;
        font-size: 0.9rem;
        outline: none;
      }
      .search-input:focus {
        border-color: #22c55e;
        box-shadow: 0 0 0 1px rgba(34, 197, 94, 0.5);
      }
      .search-btn {
        padding-inline: 18px;
      }
      .meta {
        margin-top: 14px;
        display: flex;
        justify-content: space-between;
        font-size: 0.75rem;
        color: #6b7280;
      }
      .meta strong {
        color: #e5e7eb;
        font-weight: 500;
      }
      @media (max-width: 640px) {
        .card {
          margin: 0 14px;
          padding: 24px 20px;
        }
        .card-header {
          flex-direction: column;
          align-items: flex-start;
        }
        .actions {
          flex-direction: column;
        }
        .search-row {
          flex-direction: column;
        }
        .search-btn {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <header class="card-header">
        <div>
          <h1 class="title">{{ title }}</h1>
          <p class="description">{{ description }}</p>
        </div>
        <span class="badge">Prototype</span>
      </header>

      <section class="actions">
        <button type="button" class="btn btn-primary">
          Connect Google Drive
        </button>
        <a href="{% url 'dashboard' %}" class="btn btn-outline">
          Open dashboard
        </a>
      </section>

      <section class="search-panel">
        <p class="search-label">Try a sample query</p>
        <div class="search-row">
          <input
            id="query"
            class="search-input"
            placeholder="e.g. project roadmap, invoice for client, meeting notes..."
            autocomplete="off"
          />
          <button id="search-btn" class="btn btn-primary search-btn">
            Ask assistant
          </button>
        </div>
        <div class="meta">
          <span>
            Backend API:
            <strong>Flask (`/search`)</strong>
          </span>
          <span> This page is rendered by <strong>Django</strong>. </span>
        </div>
      </section>
    </main>
  </body>
</html>
