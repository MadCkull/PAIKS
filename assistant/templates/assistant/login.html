{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <title>Sign In · PAIKS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Sign in to access your Google Drive AI Assistant." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono&display=swap"
        rel="stylesheet" />
    <!-- Load variables and animations for standard theme support -->
    <link rel="stylesheet" href="{% static 'assistant/css/variables.css' %}" />
    <link rel="stylesheet" href="{% static 'assistant/css/animations.css' %}" />
    <style>
        /* ---------- Full-page immersive layout ---------- */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font);
            color: var(--text-primary);
            overflow: hidden;
            background: var(--bg-app);
            position: relative;
        }

        /* Animated glowing background blobs */
        .ambient-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 60%);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            animation: pulse-glow 8s ease-in-out infinite alternate;
            pointer-events: none;
        }
        .ambient-glow-2 {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(96, 165, 250, 0.15) 0%, transparent 60%);
            border-radius: 50%;
            top: 20%;
            left: 30%;
            z-index: 0;
            animation: float 10s ease-in-out infinite alternate;
            pointer-events: none;
        }

        @keyframes pulse-glow {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
        }
        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(30px, -40px); }
        }

        /* ---------- Glassmorphic Login Card ---------- */
        .login-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border-light);
            border-radius: var(--radius-xl);
            padding: 48px 40px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }

        /* ---------- Brand ---------- */
        .login-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-bottom: 12px;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.04em;
        }

        .login-brand .logo-icon {
            width: 54px;
            height: 54px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--accent), #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: #fff;
            box-shadow: 0 8px 32px var(--accent-glow), inset 0 2px 4px rgba(255, 255, 255, 0.3);
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .login-subtitle {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        /* ---------- Google Push Button ---------- */
        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 14px;
            border-radius: var(--radius-md);
            background: var(--bg-card);
            border: 1px solid var(--border-dim);
            color: var(--text-primary);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            text-decoration: none;
            box-sizing: border-box;
        }

        .btn-google:hover {
            border-color: var(--accent);
            background: var(--glass-bg-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--accent-glow);
        }

        .btn-google:active {
            transform: translateY(0);
        }

        .btn-google svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        /* Decorative separator */
        .divider {
            display: flex;
            align-items: center;
            margin: 32px 0;
            color: var(--text-dim);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--glass-border);
        }
        .divider::before { margin-right: 16px; }
        .divider::after { margin-left: 16px; }

        .secure-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--color-success);
            font-size: 0.8rem;
            font-weight: 500;
            margin-top: 24px;
            opacity: 0.8;
        }
        
        .secure-badge svg {
            width: 14px;
            height: 14px;
        }
    </style>
</head>

<body>
    <!-- Immersive Background glow -->
    <div class="ambient-glow"></div>
    <div class="ambient-glow-2"></div>

    <div class="login-card">
        <div class="login-brand">
            <div class="logo-icon">⚡</div>
            <span>PAIKS</span>
        </div>
        <p class="login-subtitle">Your intelligent AI workspace for seamless document indexing and retrieval.</p>

        <a href="#" class="btn-google" id="btn-login" onclick="initiateLogin(event)">
            <!-- Custom Google G Logo -->
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Continue with Google Drive
        </a>

        <div class="divider">Or</div>

        <button class="btn btn-outline" style="width:100%;" onclick="alert('Access limited to local files. Please sign in for full features.')">Continue as Guest (Local Only)</button>

        <div class="secure-badge">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            End-to-End Secure
        </div>
    </div>

    <!-- Login Logic -->
    <script>
        async function initiateLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            btn.innerHTML = '<div class="spinner spinner-sm" style="width:16px;height:16px;border-width:2px;"></div> Connecting...';
            btn.style.pointerEvents = 'none';

            try {
                // Adjust to the right API endpoint if needed.
                const response = await fetch('/api/auth/url');
                const data = await response.json();
                if (data.url) {
                    window.location.href = data.url;
                } else {
                    alert('Error initiating login: ' + (data.error || 'Unknown error'));
                    btn.innerHTML = 'Continue with Google Drive';
                    btn.style.pointerEvents = 'auto';
                }
            } catch (err) {
                console.error('Login error:', err);
                alert('Connection failed. Please ensure the backend is running.');
                btn.innerHTML = 'Continue with Google Drive';
                btn.style.pointerEvents = 'auto';
            }
        }
    </script>
</body>
</html>
