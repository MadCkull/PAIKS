{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Sign In · PAIKS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Sign in to access your Google Drive AI Assistant." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="{% static 'assistant/css/styles.css' %}" />
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            flex-direction: column;
        }

        .login-container {
            width: 100%;
            max-width: 480px;
            text-align: center;
        }

        .login-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 32px;
            font-size: 1.4rem;
            font-weight: 700;
        }

        .login-brand .logo-icon {
            width: 42px;
            height: 42px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--accent), #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: #fff;
            box-shadow: 0 8px 24px var(--accent-glow);
        }

        .login-subtitle {
            font-size: .92rem;
            color: var(--text-muted);
            margin-bottom: 28px;
        }

        #clerk-sign-in {
            display: flex;
            justify-content: center;
        }

        /* Loading state */
        .login-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px;
        }
    </style>
</head>

<body>
    <div class="app-bg"></div>

    <div class="login-container">
        <div class="login-brand">
            <div class="logo-icon">⚡</div>
            <span>PAIKS</span>
        </div>
        <p class="login-subtitle">Sign in to access your Google Drive AI Assistant</p>

        <div id="clerk-sign-in">
            <div class="login-loading">
                <div class="spinner spinner-lg"></div>
            </div>
        </div>
    </div>

    <!-- Clerk Config -->
    <script src="{% static 'assistant/js/clerk_config.js' %}"></script>
    <!-- Clerk SDK -->
    <script>
        // Dynamically build the Clerk script tag
        (function () {
            if (!CLERK_FRONTEND_API || CLERK_FRONTEND_API === "YOUR_FRONTEND_API_URL") {
                document.getElementById('clerk-sign-in').innerHTML =
                    '<div class="card" style="padding:24px;text-align:center;">' +
                    '<p style="color:var(--red);font-weight:600;">⚠️ Clerk not configured</p>' +
                    '<p class="card-helper mt-sm">Update <code>clerk_config.js</code> with your Clerk publishable key and Frontend API URL from <a href="https://dashboard.clerk.com/~/api-keys" target="_blank" style="color:var(--accent-light)">Clerk Dashboard</a>.</p>' +
                    '</div>';
                return;
            }

            const script = document.createElement('script');
            script.async = true;
            script.crossOrigin = 'anonymous';
            script.setAttribute('data-clerk-publishable-key', CLERK_PUBLISHABLE_KEY);
            script.src = `https://${CLERK_FRONTEND_API}/npm/@clerk/clerk-js@5/dist/clerk.browser.js`;
            script.type = 'text/javascript';
            document.head.appendChild(script);

            window.addEventListener('load', async function () {
                // Wait for Clerk to be available
                const waitForClerk = () => new Promise((resolve) => {
                    if (window.Clerk) return resolve();
                    const interval = setInterval(() => {
                        if (window.Clerk) { clearInterval(interval); resolve(); }
                    }, 100);
                });

                await waitForClerk();
                await Clerk.load();

                if (Clerk.isSignedIn) {
                    // Already signed in, redirect to home
                    window.location.href = '/';
                    return;
                }

                // Mount sign-in component
                const signInDiv = document.getElementById('clerk-sign-in');
                signInDiv.innerHTML = '';
                Clerk.mountSignIn(signInDiv, {
                    afterSignInUrl: '/',
                    afterSignUpUrl: '/',
                });
            });
        })();
    </script>
</body>

</html>
