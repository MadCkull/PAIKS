{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Sign In · PAIKS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Sign in to access your Google Drive AI Assistant." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="{% static 'assistant/css/styles.css' %}" />
    <style>
        /* ---------- Full-page centered layout ---------- */
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
            flex-direction: column;
            gap: 0;
        }

        .login-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 440px;
            text-align: center;
        }

        /* ---------- Brand ---------- */
        .login-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 8px;
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: #fff;
        }

        .login-brand .logo-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--accent), #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #fff;
            box-shadow: 0 8px 32px var(--accent-glow);
        }

        .login-subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 32px;
            line-height: 1.5;
        }

        /* ---------- Clerk container ---------- */
        #clerk-sign-in {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        /* ---------- Loading spinner ---------- */
        .login-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 0;
        }

        /* ---------- Override Clerk card to match dark theme ---------- */
        .cl-card {
            background: rgba(255, 255, 255, 0.04) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            backdrop-filter: blur(24px) !important;
            -webkit-backdrop-filter: blur(24px) !important;
            border-radius: 20px !important;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.4) !important;
        }

        .cl-headerTitle {
            color: #fff !important;
        }

        .cl-headerSubtitle,
        .cl-footerActionText,
        .cl-dividerText {
            color: rgba(255, 255, 255, 0.5) !important;
        }

        .cl-footerActionLink {
            color: var(--accent-light, #60a5fa) !important;
        }

        .cl-formFieldLabel {
            color: rgba(255, 255, 255, 0.7) !important;
        }

        .cl-formFieldInput,
        .cl-input {
            background: rgba(255, 255, 255, 0.06) !important;
            border: 1px solid rgba(255, 255, 255, 0.12) !important;
            color: #fff !important;
            border-radius: 12px !important;
        }

        .cl-formFieldInput::placeholder {
            color: rgba(255, 255, 255, 0.35) !important;
        }

        .cl-formFieldInput:focus,
        .cl-input:focus {
            border-color: var(--accent, #3b82f6) !important;
            box-shadow: 0 0 0 3px var(--accent-glow, rgba(59, 130, 246, 0.15)) !important;
        }

        .cl-formButtonPrimary {
            background: linear-gradient(135deg, var(--accent, #3b82f6), #a855f7) !important;
            border: none !important;
            border-radius: 12px !important;
            font-weight: 600 !important;
            box-shadow: 0 4px 16px var(--accent-glow, rgba(59, 130, 246, 0.3)) !important;
            transition: transform .15s, box-shadow .15s !important;
        }

        .cl-formButtonPrimary:hover {
            transform: translateY(-1px) !important;
            box-shadow: 0 6px 24px var(--accent-glow, rgba(59, 130, 246, 0.4)) !important;
        }

        .cl-socialButtonsBlockButton {
            background: rgba(255, 255, 255, 0.06) !important;
            border: 1px solid rgba(255, 255, 255, 0.12) !important;
            color: #fff !important;
            border-radius: 12px !important;
            transition: background .2s !important;
        }

        .cl-socialButtonsBlockButton:hover {
            background: rgba(255, 255, 255, 0.1) !important;
        }

        .cl-socialButtonsBlockButtonText {
            color: #fff !important;
        }

        .cl-dividerLine {
            background: rgba(255, 255, 255, 0.1) !important;
        }

        .cl-cardBox {
            background: transparent !important;
            box-shadow: none !important;
        }

        .cl-footer {
            background: transparent !important;
        }

        .cl-internal-pe6vm4,
        .cl-internal-1dauvpw {
            border-top-color: rgba(255, 255, 255, 0.06) !important;
        }

        .cl-formFieldInputShowPasswordButton {
            color: rgba(255, 255, 255, 0.4) !important;
        }

        .cl-formFieldInputShowPasswordButton:hover {
            color: rgba(255, 255, 255, 0.7) !important;
        }

        .cl-lastAuthenticationStrategyBadge {
            background: rgba(59, 130, 246, 0.15) !important;
            color: var(--accent-light, #60a5fa) !important;
            border: 1px solid rgba(59, 130, 246, 0.25) !important;
        }
    </style>
</head>

<body>
    <div class="app-bg"></div>

    <div class="login-wrapper">
        <div class="login-brand">
            <div class="logo-icon">⚡</div>
            <span>PAIKS</span>
        </div>
        <p class="login-subtitle">Sign in to access your Google Drive AI Assistant</p>

        <div id="clerk-sign-in">
            <div class="login-loading">
                <div class="spinner spinner-lg"></div>
            </div>
        </div>
    </div>

    <!-- Clerk Config -->
    <script src="{% static 'assistant/js/clerk_config.js' %}"></script>
    <!-- Clerk SDK -->
    <script>
        (function () {
            if (!CLERK_FRONTEND_API || CLERK_FRONTEND_API === "YOUR_FRONTEND_API_URL") {
                document.getElementById('clerk-sign-in').innerHTML =
                    '<div class="card" style="padding:24px;text-align:center;">' +
                    '<p style="color:var(--red);font-weight:600;">⚠️ Clerk not configured</p>' +
                    '<p class="card-helper mt-sm">Update <code>clerk_config.js</code> with your keys from ' +
                    '<a href="https://dashboard.clerk.com/~/api-keys" target="_blank" style="color:var(--accent-light)">Clerk Dashboard</a>.</p>' +
                    '</div>';
                return;
            }

            const script = document.createElement('script');
            script.async = true;
            script.crossOrigin = 'anonymous';
            script.setAttribute('data-clerk-publishable-key', CLERK_PUBLISHABLE_KEY);
            script.src = `https://${CLERK_FRONTEND_API}/npm/@clerk/clerk-js@5/dist/clerk.browser.js`;
            script.type = 'text/javascript';
            document.head.appendChild(script);

            window.addEventListener('load', async function () {
                const waitForClerk = () => new Promise((resolve) => {
                    if (window.Clerk) return resolve();
                    const interval = setInterval(() => {
                        if (window.Clerk) { clearInterval(interval); resolve(); }
                    }, 100);
                });

                await waitForClerk();
                await Clerk.load({
                    appearance: {
                        variables: {
                            colorPrimary: '#3b82f6',
                            colorBackground: 'rgba(255,255,255,0.04)',
                            colorText: '#ffffff',
                            colorTextSecondary: 'rgba(255,255,255,0.5)',
                            colorInputBackground: 'rgba(255,255,255,0.06)',
                            colorInputText: '#ffffff',
                            borderRadius: '12px',
                            fontFamily: 'Inter, sans-serif',
                        },
                        elements: {
                            rootBox: { width: '100%' },
                        },
                    },
                });

                if (Clerk.isSignedIn) {
                    window.location.href = '/';
                    return;
                }

                const signInDiv = document.getElementById('clerk-sign-in');
                signInDiv.innerHTML = '';
                Clerk.mountSignIn(signInDiv, {
                    afterSignInUrl: '/',
                    afterSignUpUrl: '/',
                    appearance: {
                        variables: {
                            colorPrimary: '#3b82f6',
                            colorBackground: 'rgba(255,255,255,0.04)',
                            colorText: '#ffffff',
                            colorTextSecondary: 'rgba(255,255,255,0.5)',
                            colorInputBackground: 'rgba(255,255,255,0.06)',
                            colorInputText: '#ffffff',
                            borderRadius: '12px',
                            fontFamily: 'Inter, sans-serif',
                        },
                    },
                });
            });
        })();
    </script>
</body>

</html>
