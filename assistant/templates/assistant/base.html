{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <title>{% block title %}PAIKS{% endblock %} · AI Assistant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="AI-powered document indexing and retrieval workspace." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
  <!-- Modular CSS Architecture -->
  <link rel="stylesheet" href="{% static 'assistant/css/variables.css' %}?v=5" />
  <link rel="stylesheet" href="{% static 'assistant/css/layout.css' %}?v=5" />
  <link rel="stylesheet" href="{% static 'assistant/css/components.css' %}?v=5" />
  <link rel="stylesheet" href="{% static 'assistant/css/settings.css' %}?v=3" />
  <link rel="stylesheet" href="{% static 'assistant/css/chat.css' %}?v=5" />
  <link rel="stylesheet" href="{% static 'assistant/css/modals.css' %}?v=5" />
  <link rel="stylesheet" href="{% static 'assistant/css/animations.css' %}?v=5" />
  <link rel="stylesheet" href="{% static 'assistant/css/references.css' %}?v=5" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="icon" href="{% static 'assistant/favicon.ico' %}" type="image/x-icon" />
  {% block extra_head %}{% endblock %}
</head>

<body>
  <div class="app-bg"></div>
  {% csrf_token %}

  <!-- Auth guard overlay -->
  <div id="auth-guard"
    style="position:fixed;inset:0;z-index:9999;background:var(--bg-deep);display:flex;align-items:center;justify-content:center;">
    <div class="spinner spinner-lg"></div>
  </div>

  <div id="app">

    <!-- ── SIDEBAR ─────────────────────────────────────────────────── -->
    {% include "assistant/components/_sidebar.html" %}

    <!-- ── MAIN CONTENT ──────────────────────────────────────────────── -->
    <main class="main" id="main-content">
      {% block content %}{% endblock %}
      <footer class="page-footer">PAIKS  -  AI Assistant</footer>
    </main>

  </div><!-- /#app -->

  <!-- Theme init -->
  <script>
    (function() {
      var saved = localStorage.getItem('paiks-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', saved);
      document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('.theme-toggle-btn').forEach(function(btn) {
          btn.classList.toggle('active', btn.getAttribute('data-theme') === saved);
        });
      });
    })();

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('paiks-theme', theme);
      document.querySelectorAll('.theme-toggle-btn').forEach(function(btn) {
        btn.classList.toggle('active', btn.getAttribute('data-theme') === theme);
      });
    }
  </script>

  <!-- Modular JS Architecture -->
  <script src="{% static 'assistant/js/app.js' %}?v=3"></script>
  <script src="{% static 'assistant/js/config.js' %}"></script>
  <script src="{% static 'assistant/js/utils.js' %}"></script>
  <script src="{% static 'assistant/js/auth.js' %}"></script>
  <script src="{% static 'assistant/js/sessions.js' %}"></script>
  <script src="{% static 'assistant/js/chat.js' %}"></script>
  <script src="{% static 'assistant/js/drive.js' %}"></script>
  <script src="{% static 'assistant/js/dashboard.js' %}"></script>
  <script src="{% static 'assistant/js/settings.js' %}?v=2"></script>
  <script src="{% static 'assistant/js/toolbar.js' %}?v=5"></script>
  {% block extra_js %}{% endblock %}
</body>

</html>
