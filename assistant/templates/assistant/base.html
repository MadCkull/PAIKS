{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <title>{% block title %}PAIKS{% endblock %} · AI Assistant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Connect your Google Drive and run AI-powered search over your documents." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{% static 'assistant/css/colors.css' %}" />
  <link rel="stylesheet" href="{% static 'assistant/css/styles.css' %}" />
  {% block extra_head %}{% endblock %}
</head>

<body>
  <div class="app-bg"></div>

  <!-- Auth guard overlay -->
  <div id="auth-guard"
    style="position:fixed;inset:0;z-index:9999;background:var(--bg-deep);display:flex;align-items:center;justify-content:center;">
    <div class="spinner spinner-lg"></div>
  </div>

  <div id="app">

    <!-- ── SIDEBAR ─────────────────────────────────────────────────── -->
    {% include "assistant/components/_sidebar.html" %}

    <!-- ── MAIN CONTENT ──────────────────────────────────────────────── -->
    <main class="main" id="main-content">
      {% block content %}{% endblock %}
      <footer class="page-footer">PAIKS — Google Drive AI Assistant</footer>
    </main>

  </div><!-- /#app -->

  <!-- Theme init -->
  <script>
    (function() {
      var saved = localStorage.getItem('paiks-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', saved);
      document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('.theme-toggle-btn').forEach(function(btn) {
          btn.classList.toggle('active', btn.getAttribute('data-theme') === saved);
        });
      });
    })();

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('paiks-theme', theme);
      document.querySelectorAll('.theme-toggle-btn').forEach(function(btn) {
        btn.classList.toggle('active', btn.getAttribute('data-theme') === theme);
      });
    }
  </script>

  <!-- Clerk Config + SDK -->
  <script src="{% static 'assistant/js/clerk_config.js' %}"></script>
  <script>
    (function () {
      if (!CLERK_FRONTEND_API || CLERK_FRONTEND_API === "YOUR_FRONTEND_API_URL") {
        const guard = document.getElementById('auth-guard');
        if (guard) guard.remove();
        return;
      }
      const script = document.createElement('script');
      script.async = true;
      script.crossOrigin = 'anonymous';
      script.setAttribute('data-clerk-publishable-key', CLERK_PUBLISHABLE_KEY);
      script.src = `https://${CLERK_FRONTEND_API}/npm/@clerk/clerk-js@5/dist/clerk.browser.js`;
      script.type = 'text/javascript';
      document.head.appendChild(script);
    })();
  </script>

  <!-- App JS -->
  <script src="{% static 'assistant/js/app.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>

</html>
