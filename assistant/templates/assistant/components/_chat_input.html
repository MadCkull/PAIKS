<!-- Input Area -->
<div class="input-area">
  <div class="input-container">
    <div class="input-box modern-input-box">
      <textarea id="chat-input" class="chat-textarea modern-textarea"
        placeholder="Ask anything about your documents…" rows="1"></textarea>

      <div class="input-box-footer">
        <div class="chat-model-wrapper modern-model-wrapper">
          <button id="chat-model-btn" class="chat-model-btn modern-model-btn" aria-haspopup="listbox" aria-expanded="false" disabled>
            <span id="chat-model-indicator" class="chat-model-indicator status-offline"></span>
            <span id="chat-model-name" class="chat-model-name">Checking…</span>
            <svg class="chat-model-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">      
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </button>
          <div id="model-dropdown-menu" class="model-dropdown-menu modern-dropdown hidden" role="listbox">
            <div id="model-dropdown-list" class="model-dropdown-list">
              <!-- options populated by JS -->
            </div>
          </div>
        </div>

        <div class="input-actions">
          <button id="btn-send" class="btn-send modern-send" title="Send message" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
    <div class="input-footer">AI responses may be inaccurate. Verify important information from source documents.</div>
  </div>
</div>
