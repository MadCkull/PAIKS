{% load static %}
<!-- ── SIDEBAR — Auto-reveal floating overlay ──────────────────── -->

<!-- Invisible trigger zone (40px strip along left edge) -->
<div class="sidebar-trigger" id="sidebar-trigger" aria-hidden="true"></div>

<!-- Floating sidebar panel -->
<aside class="sidebar" id="app-sidebar" aria-label="Chat navigation">

  <!-- Logo -->
  <div class="sidebar-brand">
    <img src="{% static 'assets/PAIKS_Logo.png' %}" alt="PAIKS" class="sidebar-logo-img" />
  </div>

  <!-- New Chat -->
  <a class="sidebar-new-chat" href="{% url 'home' %}" id="btn-new-chat">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
      stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    <span>New Chat</span>
  </a>

  <!-- Chat History -->
  <div class="sidebar-section">
    <p class="sidebar-section-label">Recents</p>
    <div class="sidebar-history" id="history-list"></div>
  </div>

  <!-- User Footer -->
  <div class="sidebar-user" id="clerk-user-section">
    <div class="sidebar-user-row">
      <div id="clerk-user-button" class="clerk-user-button-mount"></div>
      <span id="sidebar-user-name" class="sidebar-user-name">Loading…</span>
    </div>
    <!-- Hidden stubs for JS compatibility -->
    <span id="sidebar-connection-dot" hidden></span>
    <span id="connection-label" hidden></span>
    <span id="drive-link-title" hidden></span>
    <span id="sidebar-user-sub" hidden></span>
  </div>

</aside><!-- /.sidebar -->
