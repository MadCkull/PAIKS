{% load static %}
<!-- ── SIDEBAR ─────────────────────────────────────────────────── -->
<aside class="sidebar" id="app-sidebar" aria-label="Main navigation">

  <!-- Header: brand + collapse -->
  <div class="sidebar-header">
    <div class="sidebar-logo">
      <div class="logo-icon">⚡</div>
      <span>PAIKS</span>
    </div>
    <button type="button" class="sidebar-collapse-toggle btn-icon" id="sidebar-collapse-toggle"
      aria-label="Toggle sidebar">
      <svg class="sidebar-collapse-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- Scrollable content -->
  <div class="sidebar-content">

    <!-- New Chat -->
    <a class="btn-new-chat btn" href="{% url 'home' %}">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      <span>New Chat</span>
    </a>

    <!-- Navigation -->
    <p class="section-label">Navigation</p>
    <nav>
      <ul class="nav-list">
        <li>
          <a class="nav-link {% block nav_files %}{% endblock %}" href="{% url 'home' %}">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <span class="nav-label">AI Assistant</span>
          </a>
        </li>
      </ul>
    </nav>

    <!-- Workspaces -->
    <p class="section-label">Workspaces</p>
    <div id="workspace-list">
      <div class="workspace-item active" data-ws="all">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
        <span>All Files</span>
        <div class="ws-dots"><div class="dot-cloud"></div><div class="dot-local"></div></div>
      </div>
      <div class="workspace-item" data-ws="drive">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
        <span>Google Drive</span>
        <div class="ws-dots"><div class="dot-cloud"></div></div>
      </div>
      <div class="workspace-item" data-ws="local">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
        <span>Local Files</span>
        <div class="ws-dots"><div class="dot-local"></div></div>
      </div>
    </div>

    <!-- Chat History -->
    <p class="section-label">Chat History</p>
    <div class="history-list" id="history-list"></div>

  </div><!-- /.sidebar-content -->

  <!-- Footer: user avatar + name -->
  <div class="sidebar-footer" id="clerk-user-section">
    <div class="footer-btn" style="cursor:default;">
      <div id="clerk-user-button" class="clerk-user-button-mount"></div>
      <span id="sidebar-user-name" class="sidebar-user-name">Loading…</span>
    </div>
    <!-- Hidden stubs for JS compatibility -->
    <span id="sidebar-connection-dot" hidden></span>
    <span id="connection-label" hidden></span>
    <span id="drive-link-title" hidden></span>
    <span id="sidebar-user-sub" hidden></span>
  </div>

</aside><!-- /.sidebar -->
