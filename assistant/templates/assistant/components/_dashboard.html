<!-- ── DASHBOARD MODAL ───────────────────────────────────────────── -->
<div id="dashboard-overlay" class="overlay hidden">
  <div class="modal modal-fullscreen" style="max-width:1000px;height:auto;max-height:90vh;">
    <div class="modal-header">
      <h3>📊 Dashboard & Stats</h3>
      <button class="btn-close btn-icon" onclick="closeModal('dashboard-overlay')">✕</button>
    </div>
    <div class="modal-body">

      <!-- Filter Bar -->
      <div class="dash-filter-bar">
        <div class="pill-toggle" id="dash-filter">
          <button class="pill-btn active" data-filter="all">All Sources</button>
          <button class="pill-btn" data-filter="cloud">☁️ Cloud</button>
          <button class="pill-btn" data-filter="local">💻 Local</button>
        </div>
      </div>

      <!-- Key Metrics -->
      <div class="stats-grid">
        <div class="stat-card">
          <h4>Total Files Indexed</h4>
          <div class="value" id="stat-total">—</div>
          <div class="breakdown" id="stat-total-breakdown">
            <span class="cloud-val"><span class="dot c"></span> <span id="stat-cloud">—</span></span>
            <span class="local-val"><span class="dot l"></span> <span id="stat-local">—</span></span>
          </div>
        </div>
        <div class="stat-card">
          <h4>ChromaDB Embeddings</h4>
          <div class="value" id="stat-embeddings">—</div>
          <div class="breakdown">
            <span class="cloud-val"><span class="dot c"></span> <span id="stat-emb-cloud">—</span></span>
            <span class="local-val"><span class="dot l"></span> <span id="stat-emb-local">—</span></span>
          </div>
        </div>
        <div class="stat-card">
          <h4>Last Sync</h4>
          <div class="value" id="stat-sync" style="font-size:1.4rem;">—</div>
          <div class="breakdown">
            <span class="cloud-val"><span class="dot c"></span> <span id="stat-sync-cloud">—</span></span>
          </div>
        </div>
      </div>

      <!-- File Type Distribution -->
      <div style="margin-top:28px;">
        <h4 style="font-size:.9rem;color:var(--text-secondary);margin-bottom:16px;font-weight:500;">File Type Distribution</h4>
        <div id="dist-bars">
          <div class="dist-bar-row"><span class="dist-bar-label" style="color:var(--text-dim);">Loading…</span></div>
        </div>
      </div>

      <!-- Second Row Stats -->
      <div class="stats-grid" style="margin-top:28px;">
        <div class="stat-card">
          <h4>Total Storage Indexed</h4>
          <div class="value" id="stat-storage" style="font-size:1.5rem;">—</div>
          <div class="breakdown">
            <span class="cloud-val"><span class="dot c"></span> <span id="stat-storage-cloud">—</span></span>
            <span class="local-val"><span class="dot l"></span> <span id="stat-storage-local">—</span></span>
          </div>
        </div>
        <div class="stat-card">
          <h4>Chat Sessions</h4>
          <div class="value" id="stat-sessions">0</div>
        </div>
        <div class="stat-card">
          <h4>LLM Status</h4>
          <div class="value" id="stat-llm" style="font-size:1.2rem;">Checking…</div>
          <p id="stat-llm-model" style="font-size:.8rem;color:var(--text-dim);margin-top:4px;"></p>
        </div>
      </div>

    </div>
  </div>
</div>
