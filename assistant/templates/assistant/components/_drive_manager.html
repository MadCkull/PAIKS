<!-- ── DRIVE MANAGER MODAL ───────────────────────────────────────── -->
<style>
/* ── Custom Three-State Checkbox ─────────────────────────────── */
.paiks-cb {
    appearance: none;
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.25);
    border-radius: 4px;
    background: transparent;
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
    transition: border-color 0.15s, background 0.15s;
}
.paiks-cb:hover {
    border-color: rgba(255,255,255,0.5);
}
.paiks-cb:checked {
    background: #34d399;
    border-color: #34d399;
}
.paiks-cb:checked::after {
    content: "";
    position: absolute;
    left: 4px; top: 1px;
    width: 5px; height: 9px;
    border: solid #fff;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
}
/* Indeterminate state (some children selected) */
.paiks-cb:indeterminate {
    background: transparent;
    border-color: #fb923c;
}
.paiks-cb:indeterminate::after {
    content: "";
    position: absolute;
    left: 3px; top: 5px;
    width: 6px; height: 2px;
    background: #fb923c;
    border-radius: 1px;
}
.paiks-cb:disabled {
    opacity: 0.3;
    cursor: not-allowed;
}

/* ── Tree Structure ──────────────────────────────────────────── */
.tree-view {
    padding: 16px 20px;
}

/* Root header  -  separated card */
.tree-root-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 18px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    margin-bottom: 8px;
}
.tree-root-icon {
    font-size: 1.3rem;
}
.tree-root-name {
    font-size: 1rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.3px;
}

/* Tree body container */
.tree-body {
    padding-left: 8px;
}

/* Generic tree node */
.tree-node {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 10px;
    border-radius: 6px;
    transition: background 0.1s;
    font-size: 0.88rem;
}
.tree-node:hover {
    background: rgba(255,255,255,0.03);
}
.tree-node-dir {
    font-weight: 600;
    color: var(--text-primary, #e2e8f0);
}
.tree-node-file {
    color: var(--text-secondary, #a0aec0);
}
.tree-icon {
    font-size: 0.95rem;
    flex-shrink: 0;
}
.tree-name {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 400px;
}
.tree-meta {
    font-size: 0.72rem;
    color: var(--text-dim, #718096);
    margin-left: auto;
    flex-shrink: 0;
}

/* Collapsible folders */
.tree-details > summary {
    list-style: none;
    cursor: pointer;
    outline: none;
}
.tree-details > summary::-webkit-details-marker {
    display: none;
}
.tree-details > summary::before {
    content: "\f054"; /* FontAwesome chevron-right */
    font-family: "Font Awesome 6 Free";
    font-weight: 900;
    font-size: 0.6rem;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 16px;
    color: var(--text-dim, #718096);
    transition: transform 0.2s ease;
}
.tree-details[open] > summary::before {
    transform: rotate(90deg);
}

/* Children indentation */
.tree-children {
    padding-left: 20px;
    margin-left: 16px;
    border-left: 1px solid rgba(255,255,255,0.06);
}

/* ── Glassmorphic Log Console ────────────────────────────────── */
#drive-log-console {
    position: absolute;
    bottom: 60px;
    right: 20px;
    width: 520px;
    height: 360px;
    background: rgba(20, 22, 30, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 12px 48px rgba(0,0,0,0.65);
    z-index: 100;
}
#drive-log-console.hidden {
    display: none;
}
#drive-log-body {
    flex-grow: 1;
    overflow-y: auto;
    padding: 14px;
    font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
    font-size: 0.78rem;
    color: #a0aec0;
}
#drive-log-body div {
    word-wrap: break-word;
}
.log-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    background: rgba(0, 0, 0, 0.25);
    border-top-left-radius: 14px;
    border-top-right-radius: 14px;
}

/* ── Floating Badges ─────────────────────────────────────────── */
#drive-badges {
    position: absolute;
    bottom: 20px;
    right: 20px;
    z-index: 90;
    display: flex;
    gap: 10px;
}
.badge {
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 0.75rem;
    font-weight: 800;
    cursor: pointer;
    background: rgba(30, 34, 42, 0.95);
    border: 1px solid rgba(255, 255, 255, 0.05);
    box-shadow: 0 4px 8px rgba(0,0,0,0.35);
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.1s ease;
    user-select: none;
    letter-spacing: 0.5px;
}
.badge:hover {
    background: rgba(45, 50, 60, 0.95);
}
.badge-success { color: #34d399; }
.badge-syncing { color: #facc15; }
.badge-warning { color: #fb923c; }
.badge-error { color: #f87171; }
</style>

<div id="drive-overlay" class="overlay hidden">
  <div class="modal modal-fullscreen">
    <div class="modal-header" style="border-bottom: 1px solid var(--border-color); padding-bottom: 15px;">
      <div style="display:flex; flex-direction:column; gap:4px;">
        <h3 style="margin:0; display:flex; align-items:center; gap:8px;">📂 Knowledge Manager</h3>
        <span style="font-size: 0.85rem; color: var(--text-dim);">Background Tracking Active</span>
      </div>
      <div style="display:flex;gap:16px;align-items:center;">
        <button class="btn-close btn-icon" onclick="closeModal('drive-overlay')">✕</button>
      </div>
    </div>
    <div class="modal-body" style="padding:0;">
      <div class="drive-layout" style="display:block;">

        <!-- File Explorer -->
        <div class="drive-explorer" style="border-right:none; height:100%;">
          <div class="drive-explorer-header">
            <div class="pill-toggle" id="drive-tabs">
              <button class="pill-btn active cloud-active" data-tab="cloud">☁️ Cloud Drive</button>
              <button class="pill-btn" data-tab="local">💻 Local Files</button>
            </div>
            <input type="text" id="drive-search-input" class="form-input"
              placeholder="Search files…"
              style="width:250px;padding:8px 16px;font-size:.9rem;border:1px solid var(--input-border);border-radius:12px;" />
          </div>

          <!-- Cloud Tree -->
          <div class="tree-view" id="tree-cloud"></div>

          <!-- Local Tree -->
          <div class="tree-view" id="tree-local" style="display:none;"></div>
        </div>

        <!-- Float Badges -->
        <div id="drive-badges">
          <div class="badge badge-success" onclick="openLogConsole()"><i class="fas fa-check-circle"></i> SYNCED</div>
        </div>

        <!-- Log Console Popup -->
        <div id="drive-log-console" class="hidden">
           <div class="log-header">
               <span style="font-weight:700; color: #fff; font-size: 0.85rem;"><i class="fas fa-terminal" style="margin-right:8px; opacity:0.5;"></i>System Logs</span>
               <div style="display:flex; gap:10px;">
                   <button onclick="clearLogs()" style="background:transparent; border:1px solid rgba(255,255,255,0.2); color:rgba(255,255,255,0.7); border-radius:4px; font-size:0.7rem; padding: 3px 8px; cursor:pointer; transition: border-color 0.1s;">Clear</button>
                   <button onclick="closeLogConsole()" style="background:transparent; border:none; color:rgba(255,255,255,0.5); font-size: 1rem; cursor:pointer; outline:none;">✕</button>
               </div>
           </div>
           <div id="drive-log-body"></div>
        </div>

      </div>
    </div>
  </div>
</div>
