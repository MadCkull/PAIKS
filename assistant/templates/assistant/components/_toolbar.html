<!-- Top Header with Toolbar -->
<header class="main-header">
  <nav class="toolbarComponent" id="toolbarComponent">

    <!-- Status: indexed files count -->
    <div class="toolbar-context" id="toolbar-context" style="display:flex; align-items:center;" title="System Normal">
      <span class="status-dot tooltip-trigger" id="toolbar-status-dot" style="background-color: var(--color-success);"></span>
      <span id="toolbar-indexed-count" style="font-weight:bold; margin: 0 6px;">0</span>
      <span style="color:var(--text-secondary)">files indexed</span>
    </div>

    <button class="tab-btn" data-action="knowledge" aria-label="Knowledge Inspector">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 21C16.9706 21 21 18.9853 21 16.5C21 14.0147 16.9706 12 12 12C7.02944 12 3 14.0147 3 16.5C3 18.9853 7.02944 21 12 21Z"/>
        <path d="M21 12C21 14.4853 16.9706 16.5 12 16.5C7.02944 16.5 3 14.4853 3 12"/>
        <path d="M21 7.5C21 9.98528 16.9706 12 12 12C7.02944 12 3 9.98528 3 7.5C3 5.01472 7.02944 3 12 3C16.9706 3 21 5.01472 21 7.5Z"/>
      </svg>
      <span class="tab-label">Knowledge</span>
    </button>

    <button class="tab-btn" data-action="drive" aria-label="Drive Manager">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
      </svg>
      <span class="tab-label">File Manager</span>
    </button>

    <button class="tab-btn" data-action="dashboard" aria-label="Dashboard">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
      </svg>
      <span class="tab-label">Dashboard</span>
    </button>

    <button class="tab-btn" data-action="settings" aria-label="Settings">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33
          1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06
          a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09
          A1.65 1.65 0 0 0 4.6 9"/>
      </svg>
      <span class="tab-label">Settings</span>
    </button>

    <div class="toolbar-separator"></div>

    <button class="tab-btn" data-action="theme" aria-label="Toggle Theme">
      <svg id="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <span class="tab-label" id="theme-label">Light Mode</span>
    </button>

  </nav>
</header>

<style>
@keyframes slow-blink-glow {
  0%   { opacity: 1;   box-shadow: 0 0 8px currentColor; }
  50%  { opacity: 0.4; box-shadow: 0 0 0px currentColor; }
  100% { opacity: 1;   box-shadow: 0 0 8px currentColor; }
}
.status-dot {
  transition: background-color 0.3s ease, box-shadow 0.3s ease;
  position: relative;
}
.status-dot-normal {
  background-color: #10b981 !important;
  box-shadow: 0 0 8px rgba(16, 185, 129, 0.4) !important;
  animation: none !important;
}
.status-dot-syncing {
  background-color: #eab308 !important; /* Yellowish */
  color: #eab308; /* For currentColor in box-shadow */
  animation: slow-blink-glow 2s infinite ease-in-out !important;
}
.status-dot-warning {
  background-color: #f59e0b !important; /* Orange/Yellow */
  box-shadow: 0 0 8px rgba(245, 158, 11, 0.5) !important;
  animation: none !important;
}
.status-dot-critical {
  background-color: #ef4444 !important; /* Red */
  box-shadow: 0 0 8px rgba(239, 68, 68, 0.6) !important;
  animation: none !important;
}
</style>
